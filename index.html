<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>够级记牌器 Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="header-title-wrapper">
                <h1>够级记牌器 <span class="badge">PRO</span></h1>
                <p class="subtitle">精准记忆，掌控牌局</p>
            </div>
            
            <div class="header-controls">
                <div class="select-wrapper">
                    <select id="gameMode" aria-label="选择游戏模式">
                        <option value="4">经典四副牌</option>
                        <option value="6">六副牌</option>
                        <option value="6e" selected>六副牌 (带鹰)</option>
                    </select>
                    <div class="select-icon">▼</div>
                </div>
                <button id="btnReset" class="btn btn-danger">
                    <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                    重置
                </button>
            </div>
        </header>

        <main class="cards-container" id="cardsContainer">
            <!-- 卡片容器将通过 JavaScript 动态生成 -->
        </main>
        
        <footer class="footer">
            <p>基于原生 HTML5 + CSS3 + JS 构建</p>
        </footer>
    </div>
    <script src="./app.js"></script>
</body>
</html>
