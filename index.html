<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>够级记牌器 Pro</title>
    <link rel="icon" type="image/png" href="./favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <div class="app-container">
        <header class="header">
            <div class="header-title-wrapper">
                <h1>够级记牌器 <span class="badge">PRO</span></h1>
                <p class="subtitle">精准记忆，掌控牌局</p>
            </div>

            <div class="header-controls">
                <div class="select-wrapper">
                    <select id="gameMode" aria-label="选择游戏模式">
                        <option value="4">经典四副牌</option>
                        <option value="6">六副牌</option>
                        <option value="6e" selected>六副牌 (带鹰)</option>
                    </select>
                    <div class="select-icon">▼</div>
                </div>
                <button id="btnReset" class="btn btn-danger">
                    <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
                        <path d="M3 3v5h5" />
                    </svg>
                    重置
                </button>
            </div>
        </header>

        <main class="cards-container" id="cardsContainer">
            <!-- 卡片容器将通过 JavaScript 动态生成 -->
        </main>

        <section class="enemy-tracker" id="enemyTracker">
            <h2 class="tracker-title">
                <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none"
                    class="icon-swords">
                    <path d="m14.5 17.5 3.5-3.5a2.12 2.12 0 0 1 3 3l-3.5 3.5a2.12 2.12 0 0 1-3-3Z" />
                    <path d="m13 19-3-3" />
                    <path d="m8 16-4 4" />
                    <path d="m5.5 14.5-3.5 3.5a2.12 2.12 0 0 0 3 3l3.5-3.5a2.12 2.12 0 0 0-3-3Z" />
                    <path d="M11 19 8 16" />
                    <path d="m16 8 4-4" />
                    <path d="M4 4l16 16" />
                </svg>
                对门已出够级牌
            </h2>
            <div class="tracker-grid" id="trackerGrid">
                <!-- 够级牌标识将由 JavaScript 生成 -->
            </div>
            <p class="tracker-hint">点击卡片标记为“已出过”</p>
        </section>

        <footer class="footer">
            <p>基于原生 HTML5 + CSS3 + JS 构建</p>
        </footer>
    </div>
    <script src="./app.js"></script>
</body>

</html>
